<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Helper - Поиск резюме и вакансий HH.ru</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>HR Helper</h1>
            <div class="auth-info">
                <div id="usageIndicator" class="usage-indicator" style="display: none;" title="Открыто контактов сегодня">
                    <span id="usageCount">0</span>/<span id="usageLimit">10</span>
                </div>
                <a href="/settings.html" class="btn btn-settings" id="settingsBtn" style="display: none;" title="Настройки">⚙️</a>
                <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" title="Переключить тему">
                    <span id="themeIcon">🌙</span>
                </button>
                <div id="userInfo" class="user-info" style="display: none;"></div>
                <button id="loginBtn" class="btn btn-secondary" onclick="login()">Войти через HH.ru</button>
                <button id="logoutBtn" class="btn" style="display: none;" onclick="logout()">Выйти</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="messages"></div>
        <div id="errors"></div>

        <div id="authRequired" class="auth-required" style="display: none;">
            <h3>⚠️ Авторизация для поиска резюме</h3>
            <p>Для поиска резюме необходима авторизация с аккаунтом работодателя. 
               <a href="#" onclick="login()">Войти через HH.ru</a></p>
        </div>

        <div class="form-card">
            <div class="tabs">
                <button id="tabVacancies" class="tab active" onclick="setSearchType('vacancies')">Вакансии</button>
                <button id="tabResumes" class="tab" onclick="handleResumeTabClick()">Резюме</button>
            </div>

            <form id="searchForm" onsubmit="return false;">
                <div class="form-row">
                    <div class="form-group">
                        <label for="keywords">Ключевые слова</label>
                        <input type="text" id="keywords" placeholder="Например: менеджер по продажам удаленно" value="менеджер по продажам удаленно">
                    </div>
                    <div class="form-group">
                        <label>Регионы <span id="selectedAreasCount" class="areas-count"></span></label>
                        <div class="area-presets">
                            <button type="button" class="preset-btn" onclick="applyAreaPreset('moscowRegion')">Москва и МО</button>
                            <button type="button" class="preset-btn" onclick="applyAreaPreset('moscowArea')">Москва и соседние регионы</button>
                        </div>
                        <div class="area-select-container">
                            <div class="area-select-header" id="areaSelectHeader" onclick="toggleAreaDropdown()">
                                <span id="areaSelectText">Все регионы</span>
                                <span class="area-select-arrow">▼</span>
                            </div>
                            <div class="area-select-dropdown" id="areaDropdown">
                                <div class="area-search">
                                    <input type="text" id="areaSearch" placeholder="Поиск региона..." oninput="filterAreas()">
                                </div>
                                <div class="area-actions">
                                    <button type="button" class="area-btn" onclick="selectAllAreas()">Выбрать все</button>
                                    <button type="button" class="area-btn" onclick="clearAllAreas()">Очистить</button>
                                </div>
                                <div class="area-list" id="areaList">
                                    <!-- Populated by JavaScript -->
                                </div>
                            </div>
                        </div>
                        <input type="hidden" id="areas" name="areas">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="schedule">График работы</label>
                        <select id="schedule">
                            <option value="">Любой</option>
                            <option value="remote">Удаленная работа</option>
                            <option value="fullDay">Полный день</option>
                            <option value="shift">Сменный график</option>
                            <option value="flexible">Гибкий график</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="experience">Опыт работы</label>
                        <select id="experience">
                            <option value="">Любой</option>
                            <option value="noExperience">Нет опыта</option>
                            <option value="between1And3">От 1 до 3 лет</option>
                            <option value="between3And6">От 3 до 6 лет</option>
                            <option value="moreThan6">Более 6 лет</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="salaryFrom">Зарплата от (руб.)</label>
                        <input type="number" id="salaryFrom" placeholder="50000" min="0">
                    </div>
                    <div class="form-group">
                        <label for="salaryTo">Зарплата до (руб.)</label>
                        <input type="number" id="salaryTo" placeholder="150000" min="0">
                    </div>
                    <div class="form-group">
                        <label for="currency">Валюта</label>
                        <select id="currency">
                            <option value="RUR">Рубли (RUB)</option>
                            <option value="USD">Доллары (USD)</option>
                            <option value="EUR">Евро (EUR)</option>
                        </select>
                    </div>
                </div>

                <button type="button" id="filterToggle" class="filters-toggle">Расширенные фильтры ▼</button>
                
                <div id="filtersAdvanced" class="filters-advanced hidden">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gender">Пол</label>
                            <select id="gender">
                                <option value="">Любой</option>
                                <option value="male">Мужской</option>
                                <option value="female">Женский</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="education">Образование</label>
                            <select id="education">
                                <option value="">Любое</option>
                                <option value="special_secondary">Среднее специальное</option>
                                <option value="higher">Высшее</option>
                                <option value="bachelor">Бакалавр</option>
                                <option value="master">Магистр</option>
                                <option value="candidate">Кандидат наук</option>
                                <option value="doctor">Доктор наук</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="ageFrom">Возраст от</label>
                            <input type="number" id="ageFrom" placeholder="18" min="18" max="100">
                        </div>
                        <div class="form-group">
                            <label for="ageTo">Возраст до</label>
                            <input type="number" id="ageTo" placeholder="65" min="18" max="100">
                        </div>
                    </div>
                </div>

                <div class="form-row" style="margin-top: 16px;">
                    <div class="form-group">
                        <label for="perPage">Результатов на страницу</label>
                        <select id="perPage">
                            <option value="20">20</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button type="button" class="btn btn-primary" id="searchBtn" onclick="search()">🔍 Найти</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="exportSection" class="export-section" style="display: none;">
            <h3>📁 Экспорт результатов</h3>
            <button class="btn btn-primary" id="exportBtn">Скачать Excel</button>
        </div>

        <div id="results"></div>

        <div id="pagination" class="pagination" style="display: none;">
            <button id="prevPage" onclick="prevPage()">← Назад</button>
            <span id="pageInfo">Страница 1 из 1</span>
            <button id="nextPage" onclick="nextPage()">Вперёд →</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
